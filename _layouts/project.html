---
layout: default
---

<article class="project-page">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    <p class="project-meta">
      <strong>Timeline:</strong> {{ page.start_year }} – {{ page.end_year }} | 
      <span class="status-badge status-{{ page.status }}">{{ page.status | upcase }}</span>
    </p>
  </header>

  {% if page.image %}
  <div class="project-hero-image">
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }} header image">
  </div>
  {% endif %}

  <div class="project-content">
    {{ content }}
  </div>
  
  <p><a href="{{ '/projects/' | relative_url }}">&larr; Back to Projects Overview</a></p>
</article>
