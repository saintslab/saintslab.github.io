---
layout: default
---

<section class="section container">
  <div class="profile-layout" style="display: flex; flex-wrap: wrap; gap: 2.5rem; margin-top: 2rem;">
    
    <aside class="profile-sidebar" style="flex: 1 1 280px; max-width: 320px;">
      <div class="card" style="overflow: hidden; width: 100%;">
        {% if page.image %}
          <div class="avatar" style="width: 100%; border-bottom: 1px solid var(--border-color, #e1e4e8);">
            <img src="{{ page.image }}" alt="{{ page.title }}" style="width: 100%; height: auto; object-fit: cover; border-radius: 0;">
          </div>
        {% endif %}
        <div class="card-body" style="padding: 1.25rem;">
          <h2 style="font-size: 1.25rem; margin-top: 0; margin-bottom: 0.5rem;">{{ page.title }}</h2>
          
          <p class="muted" style="font-size: 0.9rem; margin-bottom: 1rem;">
            <strong>Timeline:</strong><br>
            {{ page.start_year }} – {{ page.end_year }}
          </p>

          <p class="muted" style="font-size: 0.9rem; margin-bottom: 0;">
            <strong>Status:</strong><br>
            <span class="status-tag" style="display: inline-block; padding: 0.2rem 0.5rem; background: var(--bg-spaced, #f6f8fa); border: 1px solid var(--border-color, #e1e4e8); border-radius: 4px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase;">
              {{ page.status }}
            </span>
          </p>
        </div>
      </div>
      
      <p style="margin-top: 1.5rem; font-size: 0.9rem;">
        <a href="{{ '/projects/' | relative_url }}">&larr; Back to Projects</a>
      </p>
    </aside>

    <article class="profile-content" style="flex: 3 1 450px;">
      <h1 class="gradient-text" style="margin-top: 0; margin-bottom: 0.5rem; border-bottom: none;">{{ page.title }}</h1>
      {% if page.description %}
        <p class="subtitle" style="font-size: 1.2rem; color: var(--muted-color, #586069); margin-bottom: 2rem;">{{ page.description }}</p>
      {% endif %}
      
      <hr style="margin-bottom: 2rem;">

      <div class="markdown-body">
        {{ content }}
      </div>
    </article>

  </div>
</section>
